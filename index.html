<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣活動通 — 職棒 & 演唱會</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f4f6f9;
    --surface:  #ffffff;
    --card:     #ffffff;
    --border:   #e2e6ed;
    --border2:  #d0d6e0;
    --accent:   #c8922a;
    --accent2:  #3b7de8;
    --accent3:  #2daf72;
    --text:     #1a1e2a;
    --sub:      #7a8499;
    --sub2:     #a0aab8;
    --red:      #e04040;
    --green:    #2daf72;
    --radius:   10px;
    --shadow:   0 1px 4px rgba(0,0,0,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 13px 18px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .logo { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--accent); letter-spacing: .03em; }
  .logo span { color: var(--accent2); }
  .updated { margin-left: auto; font-size: .72rem; color: var(--sub2); }

  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 2px solid var(--border); padding: 0 12px; gap: 2px;
  }
  .tab {
    padding: 11px 16px; font-size: .88rem; font-weight: 500; color: var(--sub);
    cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: color .2s, border-color .2s; user-select: none; white-space: nowrap;
  }
  .tab.active    { color: var(--accent);  border-bottom-color: var(--accent); }
  .tab.t2.active { color: var(--accent3); border-bottom-color: var(--accent3); }
  .tab.t3.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  main { padding: 14px; max-width: 700px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  .filter-row { display: flex; gap: 7px; margin-bottom: 13px; flex-wrap: wrap; }
  .chip {
    padding: 5px 13px; border-radius: 20px; font-size: .8rem;
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--sub); cursor: pointer; transition: all .15s; user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  #standings-panel .chip.active { background: var(--accent3); border-color: var(--accent3); }
  #concert-panel .chip.active { background: var(--accent2); border-color: var(--accent2); }
  #concert-panel .chip:hover { border-color: var(--accent2); color: var(--accent2); }

  .date-group { margin-bottom: 18px; }
  .date-header {
    font-size: .78rem; font-weight: 700; letter-spacing: .06em; color: var(--sub);
    padding: 4px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 9px;
    display: flex; align-items: center; gap: 8px; text-transform: uppercase;
  }
  .today-badge { background: var(--accent); color: #fff; font-size: .65rem; padding: 2px 7px; border-radius: 4px; font-weight: 700; }

  .game-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow); transition: border-color .2s, box-shadow .2s;
  }
  .game-card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(200,146,42,.15); }
  .time { font-family: 'Oswald', sans-serif; font-size: .95rem; color: var(--accent); min-width: 42px; text-align: center; }
  .matchup { flex: 1; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .team { font-weight: 700; font-size: .9rem; }
  .team-emoji { font-size: 1rem; }
  .vs-label { font-size: .7rem; color: var(--sub2); }
  .stadium { font-size: .72rem; color: var(--sub); background: var(--bg); padding: 3px 9px; border-radius: 6px; white-space: nowrap; border: 1px solid var(--border); }

  /* 積分榜 */
  .standings-table {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .standings-table table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    background: var(--bg); font-size: .72rem; font-weight: 700; color: var(--sub);
    padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--border); letter-spacing: .04em;
  }
  .standings-table th:first-child { text-align: left; padding-left: 14px; }
  .standings-table td { padding: 10px 10px; text-align: center; font-size: .88rem; border-bottom: 1px solid var(--border); }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table td:first-child { text-align: left; padding-left: 14px; }
  .standings-table tr:hover td { background: #fafbfc; }
  .rank-num { font-family: 'Oswald', sans-serif; font-size: .95rem; color: var(--sub2); margin-right: 8px; }
  .rank-num.top { color: var(--accent); font-weight: 700; }
  .team-name { font-weight: 700; }
  .pct { font-family: 'Oswald', sans-serif; font-size: .9rem; }
  .gb-num { color: var(--sub); font-size: .85rem; }
  .streak { font-size: .72rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; display: inline-block; }
  .streak.win  { background: #eef8f3; color: var(--green); }
  .streak.lose { background: #fef2f2; color: var(--red); }

  .section-title {
    font-size: .78rem; font-weight: 700; color: var(--sub); letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .result-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 11px 14px; margin-bottom: 8px; display: flex; align-items: center;
    gap: 8px; box-shadow: var(--shadow);
  }
  .result-date { font-size: .72rem; color: var(--sub2); min-width: 44px; }
  .result-matchup { flex: 1; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .r-team { font-size: .88rem; display: flex; align-items: center; gap: 4px; }
  .r-score { font-family: 'Oswald', sans-serif; font-size: 1.1rem; min-width: 22px; text-align: center; }
  .r-score.win  { color: var(--green); font-weight: 700; }
  .r-score.lose { color: var(--red); }
  .r-score.draw { color: var(--sub); }
  .r-vs { font-size: .7rem; color: var(--sub2); padding: 0 2px; }

  /* 演唱會 */
  .concert-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start;
    box-shadow: var(--shadow); transition: border-color .2s, box-shadow .2s;
    text-decoration: none; color: inherit;
  }
  .concert-card:hover { border-color: var(--accent2); box-shadow: 0 2px 12px rgba(59,125,232,.12); }
  .concert-date-block { text-align: center; min-width: 46px; }
  .c-month { font-size: .65rem; color: var(--sub2); text-transform: uppercase; font-weight: 600; letter-spacing: .05em; }
  .c-day { font-family: 'Oswald', sans-serif; font-size: 1.7rem; line-height: 1.1; color: var(--accent2); }
  .concert-info { flex: 1; min-width: 0; }
  .concert-title { font-weight: 700; font-size: .93rem; line-height: 1.4; margin-bottom: 6px; }
  .concert-dates { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
  .date-row { display: flex; align-items: center; gap: 6px; font-size: .76rem; }
  .date-label {
    background: var(--bg); border: 1px solid var(--border2); padding: 1px 6px;
    border-radius: 4px; color: var(--sub); font-weight: 600; font-size: .68rem; white-space: nowrap;
  }
  .concert-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .concert-venue { font-size: .76rem; color: var(--sub); }
  .sale-badge { font-size: .7rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .sale-open    { background: #eef8f3; color: var(--green); border: 1px solid #b8e8d0; }
  .sale-pending { background: var(--bg); color: var(--sub2); border: 1px solid var(--border); }
  .sale-coming  { background: #fef8ec; color: var(--accent); border: 1px solid #f0d898; }
  .sale-soldout { background: #fef2f2; color: var(--red); border: 1px solid #fcc; }
  .platform-tag { font-size: .7rem; color: var(--sub2); margin-left: auto; white-space: nowrap; }

  .empty { text-align: center; padding: 48px 20px; color: var(--sub); font-size: .9rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--sub2); }
  .spinner { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #fef2f2; border: 1px solid #fcc; border-radius: var(--radius); padding: 13px; color: var(--red); font-size: .83rem; margin-bottom: 12px; }
  .source-link { text-align: center; padding: 20px; font-size: .73rem; color: var(--sub2); }
  .source-link a { color: var(--sub2); text-decoration: none; border-bottom: 1px dotted var(--sub2); }
</style>
</head>
<body>

<header>
  <div class="logo">台灣活動通 <span>⚡</span></div>
  <div class="updated" id="updated-time">載入中...</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('cpbl')">⚾ 職棒賽程</div>
  <div class="tab t2"     onclick="switchTab('standings')">🏆 積分榜</div>
  <div class="tab t3"     onclick="switchTab('concert')">🎤 演唱會</div>
</div>

<main>
  <div class="panel active" id="cpbl-panel">
    <div style="height:12px"></div>
    <div class="filter-row" id="team-filters">
      <div class="chip active" data-team="全部" onclick="filterTeam(this)">全部</div>
      <div class="chip" data-team="中信兄弟" onclick="filterTeam(this)">兄弟</div>
      <div class="chip" data-team="統一獅"   onclick="filterTeam(this)">統一獅</div>
      <div class="chip" data-team="樂天桃猿" onclick="filterTeam(this)">桃猿</div>
      <div class="chip" data-team="富邦悍將" onclick="filterTeam(this)">悍將</div>
      <div class="chip" data-team="味全龍"   onclick="filterTeam(this)">味全龍</div>
      <div class="chip" data-team="台鋼雄鷹" onclick="filterTeam(this)">雄鷹</div>
    </div>
    <div id="cpbl-content"><div class="loading"><div class="spinner"></div>載入賽程中...</div></div>
  </div>

  <div class="panel" id="standings-panel">
    <div style="height:12px"></div>
    <div id="standings-content"><div class="loading"><div class="spinner"></div>載入積分榜中...</div></div>
  </div>

  <div class="panel" id="concert-panel">
    <div style="height:12px"></div>
    <div class="filter-row" id="venue-filters">
      <div class="chip active" data-venue="全部" onclick="filterVenue(this)">全部</div>
      <div class="chip" data-venue="大巨蛋" onclick="filterVenue(this)">大巨蛋</div>
      <div class="chip" data-venue="小巨蛋" onclick="filterVenue(this)">小巨蛋</div>
      <div class="chip" data-venue="高雄"   onclick="filterVenue(this)">高雄</div>
      <div class="chip" data-venue="台中"   onclick="filterVenue(this)">台中</div>
    </div>
    <div id="concert-content"><div class="loading"><div class="spinner"></div>載入演唱會中...</div></div>
  </div>
</main>

<div class="source-link">
  資料來源：<a href="https://www.cpbl.com.tw" target="_blank">CPBL</a>・
  <a href="https://www.tickettw.com" target="_blank">TicketTW</a>・
  <a href="https://kktix.com" target="_blank">KKTIX</a>
</div>

<script>
const BASE = './';
const TEAM_EMOJI = { '中信兄弟':'🐘','統一獅':'🦁','樂天桃猿':'🐒','富邦悍將':'⚔️','味全龍':'🐉','台鋼雄鷹':'🦅' };
const STADIUM_FULL = { '大巨蛋':'台北大巨蛋','洲際':'台中洲際','澄清湖':'高雄澄清湖','亞太':'台南亞太','桃園':'桃園國際','新莊':'新莊棒球場','斗六':'斗六棒球場' };
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const WEEKDAYS = ['日','一','二','三','四','五','六'];

let cpblData = null, standingsData = null, concertData = null;
let activeTeam = '全部', activeVenue = '全部';

function switchTab(tab) {
  const map = ['cpbl','standings','concert'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', map[i]===tab));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', map[i]===tab));
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function isFuture(s) { return s >= todayStr(); }
function formatHeader(dateStr) {
  const [y,m,d] = dateStr.split('/');
  const dt = new Date(+y,+m-1,+d);
  return `${m}/${d}（${WEEKDAYS[dt.getDay()]}）`;
}
function friendlyDate(s) {
  if (!s) return '';
  const p = s.split('/');
  return `${+p[1]}月${+p[2]}日`;
}
function monthName(s) { return MONTHS[parseInt(s.split('/')[1])-1]||''; }

/* ── 賽程 ── */
function renderCpbl() {
  const el = document.getElementById('cpbl-content');
  if (!cpblData) return;
  const games = cpblData.games
    .filter(g => isFuture(g.date))
    .filter(g => activeTeam==='全部' || g.away===activeTeam || g.home===activeTeam);
  if (!games.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">⚾</div>沒有符合的賽程</div>`; return; }
  const groups = {};
  games.forEach(g => { (groups[g.date]=groups[g.date]||[]).push(g); });
  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const isT = date===todayStr();
    html += `<div class="date-group"><div class="date-header">${formatHeader(date)}${isT?' <span class="today-badge">TODAY</span>':''}</div>`;
    groups[date].forEach(g => {
      html += `<div class="game-card">
        <div class="time">${g.time}</div>
        <div class="matchup">
          <span class="team-emoji">${TEAM_EMOJI[g.away]||'⚾'}</span>
          <span class="team">${g.away}</span>
          <span class="vs-label">客 VS 主</span>
          <span class="team">${g.home}</span>
          <span class="team-emoji">${TEAM_EMOJI[g.home]||'⚾'}</span>
        </div>
        <div class="stadium">📍 ${STADIUM_FULL[g.stadium]||g.stadium}</div>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}
function filterTeam(chip) {
  document.querySelectorAll('#team-filters .chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active'); activeTeam=chip.dataset.team; renderCpbl();
}

/* ── 積分榜 ── */
function renderStandings() {
  const el = document.getElementById('standings-content');
  if (!standingsData) return;
  const { standings, recent } = standingsData;

  let html = `<div class="standings-table"><table>
    <thead><tr>
      <th>隊伍</th><th>勝</th><th>敗</th><th>勝率</th><th>差距</th><th>連續</th>
    </tr></thead><tbody>`;
  standings.forEach((t,i) => {
    const isTop = i < 4;
    const streakW = t.streak.startsWith('W');
    const streakLabel = streakW ? `勝${t.streak.slice(1)}` : `敗${t.streak.slice(1)}`;
    html += `<tr>
      <td>
        <span class="rank-num ${isTop?'top':''}">${t.rank}</span>
        <span>${TEAM_EMOJI[t.team]||''}</span>
        <span class="team-name">${t.team}</span>
      </td>
      <td style="color:var(--green);font-weight:600">${t.win}</td>
      <td style="color:var(--red)">${t.loss}</td>
      <td><span class="pct">${t.pct}</span></td>
      <td><span class="gb-num">${t.gb}</span></td>
      <td><span class="streak ${streakW?'win':'lose'}">${streakLabel}</span></td>
    </tr>`;
  });
  html += `</tbody></table></div>
  <div style="font-size:.72rem;color:var(--sub2);margin-bottom:20px;padding:0 2px">🏅 前 4 名晉級季後賽</div>`;

  if (recent && recent.length) {
    html += `<div class="section-title">近期比賽結果</div>`;
    const groups = {};
    recent.forEach(g => { (groups[g.date]=groups[g.date]||[]).push(g); });
    Object.keys(groups).sort().reverse().forEach(date => {
      html += `<div class="date-header" style="margin-top:4px">${formatHeader(date)}</div>`;
      groups[date].forEach(g => {
        const aw = g.away_score > g.home_score, hw = g.home_score > g.away_score, dr = g.away_score===g.home_score;
        html += `<div class="result-card">
          <div class="result-date">${friendlyDate(date)}</div>
          <div class="result-matchup">
            <div class="r-team"><span>${TEAM_EMOJI[g.away]||'⚾'}</span><span style="font-weight:${aw?700:400}">${g.away}</span></div>
            <span class="r-score ${aw?'win':dr?'draw':'lose'}">${g.away_score}</span>
            <span class="r-vs">:</span>
            <span class="r-score ${hw?'win':dr?'draw':'lose'}">${g.home_score}</span>
            <div class="r-team"><span style="font-weight:${hw?700:400}">${g.home}</span><span>${TEAM_EMOJI[g.home]||'⚾'}</span></div>
            ${dr?'<span style="font-size:.7rem;color:var(--sub2)">和局</span>':''}
          </div>
        </div>`;
      });
    });
  }
  el.innerHTML = html;
}

/* ── 演唱會 ── */
function renderConcerts() {
  const el = document.getElementById('concert-content');
  if (!concertData) return;
  const concerts = concertData.concerts
    .filter(c => isFuture(c.date))
    .filter(c => activeVenue==='全部' || c.venue.includes(activeVenue))
    .sort((a,b) => a.date.localeCompare(b.date));
  if (!concerts.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">🎤</div>沒有符合的演唱會</div>`; return; }
  let html = '';
  concerts.forEach(c => {
    const day = c.date.split('/')[2]||'--';
    const mon = monthName(c.date);
    const st = c.sale_date||'';
    let sc='sale-pending', sl='⏳ 待公布';
    if (c.sold_out)                         { sc='sale-soldout'; sl='🔴 已完售'; }
    else if (st.includes('已開賣'))          { sc='sale-open'; sl='🟢 售票中'; }
    else if (st && !st.includes('待公布'))   { sc='sale-coming'; sl='🗓 '+st+' 開賣'; }
    html += `<a class="concert-card" href="${c.url||'#'}" target="_blank" rel="noopener">
      <div class="concert-date-block">
        <div class="c-month">${mon}</div>
        <div class="c-day">${day}</div>
      </div>
      <div class="concert-info">
        <div class="concert-title">${c.title}</div>
        <div class="concert-dates">
          <div class="date-row"><span class="date-label">表演</span><span>${friendlyDate(c.date)}</span></div>
          ${st?`<div class="date-row"><span class="date-label">售票</span><span>${st}</span></div>`:''}
        </div>
        <div class="concert-meta">
          <span class="concert-venue">📍 ${c.venue}</span>
          <span class="sale-badge ${sc}">${sl}</span>
          ${c.platform?`<span class="platform-tag">${c.platform}</span>`:''}
        </div>
      </div>
    </a>`;
  });
  el.innerHTML = html;
}
function filterVenue(chip) {
  document.querySelectorAll('#venue-filters .chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active'); activeVenue=chip.dataset.venue; renderConcerts();
}

/* ── 載入 ── */
function formatUpdated(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `更新：${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
async function loadData() {
  const cb = '?t='+Date.now(); let updatedAt='';
  await Promise.all([
    fetch(BASE+'data/cpbl.json'+cb).then(r=>r.json()).then(d=>{cpblData=d;updatedAt=d.updated;renderCpbl();})
      .catch(e=>{ document.getElementById('cpbl-content').innerHTML=`<div class="error-msg">⚠️ 無法載入棒球資料<br><small>${e.message}</small></div>`; }),
    fetch(BASE+'data/standings.json'+cb).then(r=>r.json()).then(d=>{standingsData=d;renderStandings();})
      .catch(e=>{ document.getElementById('standings-content').innerHTML=`<div class="error-msg">⚠️ 無法載入積分榜<br><small>${e.message}</small></div>`; }),
    fetch(BASE+'data/concerts.json'+cb).then(r=>r.json()).then(d=>{concertData=d;renderConcerts();})
      .catch(e=>{ document.getElementById('concert-content').innerHTML=`<div class="error-msg">⚠️ 無法載入演唱會資料<br><small>${e.message}</small></div>`; }),
  ]);
  document.getElementById('updated-time').textContent = formatUpdated(updatedAt);
}
loadData();
</script>
</body>
</html>
