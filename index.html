<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣活動通 — 職棒 & 演唱會</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #161b24;
    --card:     #1e2532;
    --border:   #2a3244;
    --accent:   #e8b84b;   /* 棒球皮革金 */
    --accent2:  #5b9cf6;   /* 演唱會藍光 */
    --text:     #e8eaf0;
    --sub:      #7a8499;
    --red:      #e05252;
    --green:    #4caf82;
    --radius:   10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* ── 頂部 ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Oswald', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--accent);
  }
  .logo span { color: var(--accent2); }
  .updated {
    margin-left: auto;
    font-size: .72rem;
    color: var(--sub);
  }

  /* ── Tab 切換 ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .tab {
    padding: 12px 20px;
    font-size: .9rem;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color .2s, border-color .2s;
    user-select: none;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab.concerts.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
  }

  /* ── 主體 ── */
  main { padding: 16px; max-width: 700px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── 篩選列 ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: .8rem;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--sub);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .chip.active, .chip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }
  #concert-panel .chip.active, #concert-panel .chip:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  /* ── 日期標題 ── */
  .date-group { margin-bottom: 20px; }
  .date-header {
    font-family: 'Oswald', sans-serif;
    font-size: .85rem;
    letter-spacing: .08em;
    color: var(--sub);
    text-transform: uppercase;
    padding: 4px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .today-badge {
    background: var(--accent);
    color: #000;
    font-size: .68rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 700;
  }

  /* ── 棒球比賽卡 ── */
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color .2s;
  }
  .game-card:hover { border-color: var(--accent); }

  .time {
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    color: var(--accent);
    min-width: 44px;
    text-align: center;
  }
  .matchup {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .team {
    font-weight: 600;
    font-size: .95rem;
  }
  .team-emoji { font-size: 1.1rem; }
  .vs {
    font-size: .72rem;
    color: var(--sub);
    font-weight: 500;
  }
  .stadium {
    margin-left: auto;
    font-size: .75rem;
    color: var(--sub);
    background: var(--surface);
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
  }

  /* ── 演唱會卡 ── */
  .concert-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color .2s;
    text-decoration: none;
    color: inherit;
  }
  .concert-card:hover { border-color: var(--accent2); }

  .concert-date-block {
    text-align: center;
    min-width: 46px;
  }
  .c-month {
    font-size: .7rem;
    color: var(--sub);
    text-transform: uppercase;
  }
  .c-day {
    font-family: 'Oswald', sans-serif;
    font-size: 1.6rem;
    line-height: 1.1;
    color: var(--accent2);
  }

  .concert-info { flex: 1; }
  .concert-title {
    font-weight: 700;
    font-size: .95rem;
    line-height: 1.4;
    margin-bottom: 5px;
  }
  .concert-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .concert-venue {
    font-size: .78rem;
    color: var(--sub);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .sale-badge {
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .sale-open {
    background: rgba(76,175,130,.15);
    color: var(--green);
    border: 1px solid rgba(76,175,130,.3);
  }
  .sale-pending {
    background: rgba(122,132,153,.12);
    color: var(--sub);
    border: 1px solid var(--border);
  }
  .sale-coming {
    background: rgba(232,184,75,.12);
    color: var(--accent);
    border: 1px solid rgba(232,184,75,.3);
  }
  .platform-tag {
    font-size: .7rem;
    color: var(--sub);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── 空狀態 ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--sub);
    font-size: .9rem;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* ── 載入中 ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--sub);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 錯誤 ── */
  .error-msg {
    background: rgba(224,82,82,.1);
    border: 1px solid rgba(224,82,82,.3);
    border-radius: var(--radius);
    padding: 14px;
    color: var(--red);
    font-size: .85rem;
    margin-bottom: 12px;
  }

  /* ── 底部連結 ── */
  .source-link {
    text-align: center;
    padding: 20px;
    font-size: .75rem;
    color: var(--sub);
  }
  .source-link a {
    color: var(--sub);
    text-decoration: none;
    border-bottom: 1px dotted var(--sub);
  }
</style>
</head>
<body>

<header>
  <div class="logo">台灣活動通 <span>⚡</span></div>
  <div class="updated" id="updated-time">載入中...</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('cpbl')">⚾ 中華職棒</div>
  <div class="tab concerts" onclick="switchTab('concert')">🎤 演唱會</div>
</div>

<main>

  <!-- ── 職棒面板 ── -->
  <div class="panel active" id="cpbl-panel">
    <div style="height:12px"></div>
    <div class="filter-row" id="team-filters">
      <div class="chip active" data-team="全部" onclick="filterTeam(this)">全部</div>
      <div class="chip" data-team="中信兄弟" onclick="filterTeam(this)">兄弟</div>
      <div class="chip" data-team="統一獅" onclick="filterTeam(this)">統一獅</div>
      <div class="chip" data-team="樂天桃猿" onclick="filterTeam(this)">桃猿</div>
      <div class="chip" data-team="富邦悍將" onclick="filterTeam(this)">悍將</div>
      <div class="chip" data-team="味全龍" onclick="filterTeam(this)">味全龍</div>
      <div class="chip" data-team="台鋼雄鷹" onclick="filterTeam(this)">雄鷹</div>
    </div>
    <div id="cpbl-content"><div class="loading"><div class="spinner"></div>載入賽程中...</div></div>
  </div>

  <!-- ── 演唱會面板 ── -->
  <div class="panel" id="concert-panel">
    <div style="height:12px"></div>
    <div class="filter-row" id="venue-filters">
      <div class="chip active" data-venue="全部" onclick="filterVenue(this)">全部</div>
      <div class="chip" data-venue="大巨蛋" onclick="filterVenue(this)">大巨蛋</div>
      <div class="chip" data-venue="小巨蛋" onclick="filterVenue(this)">小巨蛋</div>
      <div class="chip" data-venue="高雄" onclick="filterVenue(this)">高雄</div>
      <div class="chip" data-venue="台中" onclick="filterVenue(this)">台中</div>
    </div>
    <div id="concert-content"><div class="loading"><div class="spinner"></div>載入演唱會中...</div></div>
  </div>

</main>

<div class="source-link">
  資料來源：<a href="https://www.cpbl.com.tw" target="_blank">CPBL 中華職棒</a>・
  <a href="https://www.tickettw.com" target="_blank">TicketTW</a>・
  <a href="https://kktix.com" target="_blank">KKTIX</a>
</div>

<script>
// ── 設定 ───────────────────────────────────────────────
// 本地開發時讀 data/，部署到 GitHub Pages 後自動正確
const BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? './'
  : './';

const TEAM_EMOJI = {
  '中信兄弟': '🐅',
  '統一獅':   '🦁',
  '樂天桃猿': '🐒',
  '富邦悍將': '🦅',
  '味全龍':   '🐉',
  '台鋼雄鷹': '🦅',
};

const STADIUM_FULL = {
  '大巨蛋': '台北大巨蛋',
  '洲際':   '台中洲際棒球場',
  '澄清湖': '高雄澄清湖棒球場',
  '亞太':   '台南亞太棒球場',
  '桃園':   '桃園國際棒球場',
  '新莊':   '新莊棒球場',
  '斗六':   '斗六棒球場',
};

// ── 狀態 ───────────────────────────────────────────────
let cpblData = null;
let concertData = null;
let activeTeam = '全部';
let activeVenue = '全部';
let activeTab = 'cpbl';

// ── Tab 切換 ────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'cpbl') || (i === 1 && tab === 'concert'));
  });
  document.getElementById('cpbl-panel').classList.toggle('active', tab === 'cpbl');
  document.getElementById('concert-panel').classList.toggle('active', tab === 'concert');
}

// ── 日期工具 ────────────────────────────────────────────
function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}/${m}/${dd}`;
}

function formatDateHeader(dateStr) {
  // dateStr: "2026/05/12"
  const [y, m, d] = dateStr.split('/');
  const dt = new Date(+y, +m-1, +d);
  const days = ['日','一','二','三','四','五','六'];
  const weekday = days[dt.getDay()];
  return `${m}/${d}（${weekday}）`;
}

function monthName(dateStr) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const m = parseInt(dateStr.split('/')[1]);
  return months[m-1];
}

function isToday(dateStr) {
  return dateStr === today();
}

function isFuture(dateStr) {
  return dateStr >= today();
}

// ── 棒球渲染 ────────────────────────────────────────────
function renderCpbl() {
  const el = document.getElementById('cpbl-content');
  if (!cpblData) { el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>'; return; }

  const games = cpblData.games
    .filter(g => isFuture(g.date))
    .filter(g => activeTeam === '全部' || g.away === activeTeam || g.home === activeTeam);

  if (!games.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚾</div>沒有符合的賽程</div>`;
    return;
  }

  // 依日期分組
  const groups = {};
  games.forEach(g => {
    if (!groups[g.date]) groups[g.date] = [];
    groups[g.date].push(g);
  });

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const isT = isToday(date);
    html += `<div class="date-group">
      <div class="date-header">
        ${formatDateHeader(date)}
        ${isT ? '<span class="today-badge">TODAY</span>' : ''}
      </div>`;
    groups[date].forEach(g => {
      const awayEmoji = TEAM_EMOJI[g.away] || '⚾';
      const homeEmoji = TEAM_EMOJI[g.home] || '⚾';
      const stadiumFull = STADIUM_FULL[g.stadium] || g.stadium;
      html += `
      <div class="game-card">
        <div class="time">${g.time}</div>
        <div class="matchup">
          <span class="team-emoji">${awayEmoji}</span>
          <span class="team">${g.away}</span>
          <span class="vs">客場</span>
          <span class="vs">VS</span>
          <span class="vs">主場</span>
          <span class="team">${g.home}</span>
          <span class="team-emoji">${homeEmoji}</span>
        </div>
        <div class="stadium">📍 ${stadiumFull}</div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;
}

function filterTeam(chip) {
  document.querySelectorAll('#team-filters .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeTeam = chip.dataset.team;
  renderCpbl();
}

// ── 演唱會渲染 ──────────────────────────────────────────
function renderConcerts() {
  const el = document.getElementById('concert-content');
  if (!concertData) { el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>'; return; }

  const concerts = concertData.concerts
    .filter(c => isFuture(c.date))
    .filter(c => activeVenue === '全部' || c.venue.includes(activeVenue));

  if (!concerts.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎤</div>沒有符合的演唱會</div>`;
    return;
  }

  concerts.sort((a,b) => a.date.localeCompare(b.date));

  let html = '';
  concerts.forEach(c => {
    const day = c.date.split('/')[2] || '--';
    const mon = monthName(c.date);
    const saleText = c.sale_date || '';
    let saleClass = 'sale-pending';
    let saleLabel = '待公布';
    if (saleText.includes('已開賣') || saleText === '已開賣') {
      saleClass = 'sale-open'; saleLabel = '🟢 售票中';
    } else if (saleText.includes('待公布')) {
      saleClass = 'sale-pending'; saleLabel = '⏳ 待公布';
    } else if (saleText) {
      saleClass = 'sale-coming'; saleLabel = '🗓 ' + saleText;
    }

    const href = c.url || '#';
    html += `
    <a class="concert-card" href="${href}" target="_blank" rel="noopener">
      <div class="concert-date-block">
        <div class="c-month">${mon}</div>
        <div class="c-day">${day}</div>
      </div>
      <div class="concert-info">
        <div class="concert-title">${c.title}</div>
        <div class="concert-meta">
          <span class="concert-venue">📍 ${c.venue}</span>
          <span class="sale-badge ${saleClass}">${saleLabel}</span>
          ${c.platform ? `<span class="platform-tag">${c.platform}</span>` : ''}
        </div>
      </div>
    </a>`;
  });

  el.innerHTML = html;
}

function filterVenue(chip) {
  document.querySelectorAll('#venue-filters .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeVenue = chip.dataset.venue;
  renderConcerts();
}

// ── 載入資料 ────────────────────────────────────────────
function formatUpdated(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const m = d.getMonth()+1, dd = d.getDate();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `更新：${m}/${dd} ${hh}:${mm}`;
}

async function loadData() {
  const cb = '?t=' + Date.now();
  let updatedAt = '';

  try {
    const r = await fetch(BASE + 'data/cpbl.json' + cb);
    if (!r.ok) throw new Error('cpbl fetch failed');
    cpblData = await r.json();
    updatedAt = cpblData.updated;
    renderCpbl();
  } catch(e) {
    document.getElementById('cpbl-content').innerHTML =
      `<div class="error-msg">⚠️ 無法載入棒球資料。請確認 data/cpbl.json 存在。<br><small>${e.message}</small></div>`;
  }

  try {
    const r = await fetch(BASE + 'data/concerts.json' + cb);
    if (!r.ok) throw new Error('concerts fetch failed');
    concertData = await r.json();
    if (!updatedAt) updatedAt = concertData.updated;
    renderConcerts();
  } catch(e) {
    document.getElementById('concert-content').innerHTML =
      `<div class="error-msg">⚠️ 無法載入演唱會資料。請確認 data/concerts.json 存在。<br><small>${e.message}</small></div>`;
  }

  document.getElementById('updated-time').textContent = formatUpdated(updatedAt);
}

loadData();
</script>
</body>
</html>
